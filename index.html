<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도덕 수업 영상 모음</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f6fa; --surface:#fff; --accent:#4263eb; --accent2:#e64980;
  --text:#1c1e2e; --text-muted:#868e9e; --border:#e8eaf2;
  --shadow-sm:0 1px 6px rgba(0,0,0,.06); --shadow-md:0 4px 20px rgba(0,0,0,.09); --r:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── 헤더 */
header{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px;}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
header h1{font-size:16px;font-weight:700;letter-spacing:-.3px;}
.header-actions{margin-left:auto;display:flex;gap:8px;}
.hdr-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 13px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:5px;}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── 학년 탭 */
.grade-tabs{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px 0;display:flex;gap:4px;overflow-x:auto;}
.grade-tab{padding:8px 18px;border-radius:8px 8px 0 0;border:1px solid transparent;border-bottom:none;background:transparent;color:var(--text-muted);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;position:relative;bottom:-1px;flex-shrink:0;}
.grade-tab:hover{color:var(--text);background:var(--bg);}
.grade-tab.active{background:var(--bg);border-color:var(--border);color:var(--accent);font-weight:700;}

/* ── 본문 */
main{padding:24px;max-width:1280px;margin:0 auto;}

/* ── 대단원 */
.major-section{margin-bottom:12px;}
.major-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;user-select:none;transition:box-shadow .15s;}
.major-header:hover{box-shadow:var(--shadow-sm);}
.major-section.open .major-header{border-radius:var(--r) var(--r) 0 0;border-bottom-color:transparent;}
.major-badge{font-size:11px;font-weight:900;padding:3px 10px;border-radius:20px;letter-spacing:.5px;flex-shrink:0;}
.major-title{font-size:15px;font-weight:700;}
.major-count{font-size:11px;color:var(--text-muted);margin-left:auto;flex-shrink:0;}
.major-chevron{font-size:13px;color:var(--text-muted);transition:transform .22s;margin-left:6px;flex-shrink:0;}
.major-section.open .major-chevron{transform:rotate(180deg);}
.major-body{display:none;padding:16px;background:#fff;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);margin-bottom:28px;}
.major-section.open .major-body{display:block;}
.m0{background:#eef1ff;color:#4263eb;} .m1{background:#fff0f6;color:#c2255c;}
.m2{background:#fff3e0;color:#d4651a;} .m3{background:#ebfbee;color:#2b8a3e;}
.m4{background:#f3e8ff;color:#7048e8;}

/* ── 중단원 */
.minor-section{margin-bottom:22px;padding-left:4px;}
.minor-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.minor-label{font-size:11px;font-weight:700;padding:2px 9px;border-radius:12px;background:var(--bg);border:1px solid var(--border);color:var(--text-muted);flex-shrink:0;}
.minor-title{font-size:14px;font-weight:600;}
.minor-count{font-size:11px;color:var(--text-muted);margin-left:auto;flex-shrink:0;}

/* ── 영상 카드 */
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding-left:8px;}
.video-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;text-decoration:none;color:inherit;transition:transform .18s,box-shadow .18s;display:block;box-shadow:var(--shadow-sm);position:relative;}
.video-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.thumb-wrap{position:relative;padding-top:56.25%;background:#eee;overflow:hidden;}
.thumb-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.video-card:hover .thumb-wrap img{transform:scale(1.05);}
.play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:rgba(0,0,0,.45);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s;backdrop-filter:blur(2px);}
.play-btn svg{width:16px;height:16px;fill:#fff;margin-left:2px;}
.video-card:hover .play-btn{opacity:1;}
.yt-tag{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.6);border-radius:3px;padding:2px 5px;font-size:9px;font-weight:700;color:#ff4444;}
.dur-tag{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.65);border-radius:3px;padding:2px 6px;font-size:10px;font-weight:700;color:#fff;}
.card-del{position:absolute;top:7px;left:7px;width:26px;height:26px;background:rgba(0,0,0,.55);border:none;border-radius:50%;color:#fff;font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s;z-index:10;}
.video-card:hover .card-del{opacity:1;}
.card-del:hover{background:rgba(210,30,45,.85);}
.card-inner{display:block;text-decoration:none;color:inherit;}
.card-info{padding:11px 12px;}
.card-title{font-size:12.5px;font-weight:500;line-height:1.5;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-sub{margin-top:5px;font-size:10.5px;color:var(--text-muted);}

/* ── 빈 상태 */
.no-video{padding:14px 0 4px 8px;font-size:12.5px;color:var(--text-muted);}
.empty-grade{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-grade .ei{font-size:40px;margin-bottom:10px;}

/* ── FAB */
.fab{position:fixed;bottom:24px;right:24px;z-index:200;}
.fab-btn{background:var(--accent);color:#fff;border:none;border-radius:50px;padding:12px 20px;font-size:13.5px;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(66,99,235,.38);transition:transform .18s,box-shadow .18s;font-family:inherit;display:flex;align-items:center;gap:6px;}
.fab-btn:hover{transform:translateY(-2px);box-shadow:0 7px 26px rgba(66,99,235,.46);}

/* ── 모달 공통 */
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:400;backdrop-filter:blur(3px);align-items:flex-end;justify-content:center;}
.backdrop.open{display:flex;}
.sheet{background:#fff;border-radius:18px 18px 0 0;padding:18px 20px 34px;width:100%;max-width:540px;animation:up .24s ease;max-height:92vh;overflow-y:auto;}
@keyframes up{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.drag-handle{width:34px;height:4px;background:#dde1ef;border-radius:2px;margin:0 auto 16px;}
.sheet h2{font-size:15px;font-weight:700;margin-bottom:14px;}
.field-label{display:block;font-size:10.5px;font-weight:700;color:var(--text-muted);letter-spacing:.4px;text-transform:uppercase;margin-top:12px;margin-bottom:4px;}
.field{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13.5px;font-family:inherit;outline:none;transition:border-color .15s;}
.field:focus{border-color:var(--accent);}
.field::placeholder{color:#c4c8d8;}
.thumb-preview{display:none;margin-top:9px;border-radius:9px;overflow:hidden;border:1px solid var(--border);}
.thumb-preview.show{display:block;}
.thumb-preview img{width:100%;display:block;}
.thumb-preview-label{padding:7px 11px;font-size:11px;color:var(--text-muted);background:var(--bg);}
.btn-row{display:flex;gap:8px;margin-top:16px;}
.btn-ok{flex:1;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:11px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.btn-ok:hover{opacity:.85;}
.btn-ok:disabled{opacity:.5;cursor:not-allowed;}
.btn-cancel{background:var(--bg);border:1px solid var(--border);color:var(--text-muted);border-radius:9px;padding:11px 16px;font-size:13.5px;cursor:pointer;font-family:inherit;}

/* ── 목차 편집 */
.toc-grade-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.toc-gtab{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:12px;cursor:pointer;font-family:inherit;color:var(--text-muted);transition:all .15s;}
.toc-gtab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.toc-major-block{margin-bottom:14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.toc-major-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:#fff;}
.toc-major-num{font-size:11px;font-weight:700;color:var(--text-muted);min-width:28px;}
.toc-major-input{flex:1;background:transparent;border:none;font-size:13.5px;font-family:inherit;color:var(--text);outline:none;font-weight:600;}
.toc-major-input::placeholder{color:#c4c8d8;}
.toc-del-btn{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:0 2px;line-height:1;}
.toc-del-btn:hover{color:var(--accent2);}
.toc-minor-list{padding:8px 10px;display:flex;flex-direction:column;gap:6px;}
.toc-minor-row{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.toc-minor-num{font-size:10.5px;font-weight:700;color:var(--text-muted);min-width:32px;}
.toc-minor-input{flex:1;background:transparent;border:none;font-size:12.5px;font-family:inherit;color:var(--text);outline:none;}
.toc-minor-input::placeholder{color:#c4c8d8;}
.toc-add-minor{width:100%;background:none;border:1px dashed var(--border);border-radius:8px;padding:7px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .15s;}
.toc-add-minor:hover{border-color:var(--accent);color:var(--accent);}
.toc-add-major{width:100%;background:none;border:1px dashed var(--border);border-radius:10px;padding:10px;font-size:13px;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .15s;margin-bottom:14px;}
.toc-add-major:hover{border-color:var(--accent);color:var(--accent);}

/* ── 학년 편집 */
.grade-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
.grade-item{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 12px;}
.grade-item input{flex:1;background:transparent;border:none;font-size:13.5px;font-family:inherit;color:var(--text);outline:none;}
.grade-item input::placeholder{color:#c4c8d8;}
.grade-add-btn{width:100%;background:none;border:1px dashed var(--border);border-radius:9px;padding:10px;font-size:13px;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:all .15s;}
.grade-add-btn:hover{border-color:var(--accent);color:var(--accent);}

@media(max-width:600px){
  main{padding:16px;} header{padding:12px 16px;} .grade-tabs{padding:12px 16px 0;}
  .video-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
}
</style>
</head>
<body>

<header>
  <div class="logo">🎬</div>
  <h1>도덕 수업 영상 모음</h1>
  <div class="header-actions">
    <button class="hdr-btn" onclick="openGradeEdit()">🏫 학년 편집</button>
    <button class="hdr-btn" onclick="openToc()">📋 목차 편집</button>
  </div>
</header>

<div class="grade-tabs" id="gradeTabs"></div>
<main id="mainArea"></main>

<div class="fab">
  <button class="fab-btn" onclick="openAddVideo()">＋ 영상 추가</button>
</div>

<!-- 영상 추가 모달 -->
<div class="backdrop" id="addModal" onclick="bdClick(event,'addModal')">
  <div class="sheet">
    <div class="drag-handle"></div>
    <h2>🎬 영상 추가하기</h2>
    <label class="field-label">YouTube URL</label>
    <input class="field" id="urlInput" placeholder="https://youtu.be/..." oninput="onUrlInput(this.value)">
    <div class="thumb-preview" id="thumbPreview">
      <img id="thumbImg" src="" alt="">
      <div class="thumb-preview-label">썸네일 미리보기</div>
    </div>
    <label class="field-label">학년</label>
    <select class="field" id="gradeSelect" onchange="onGradeSelectChange()"></select>
    <label class="field-label">대단원</label>
    <select class="field" id="majorSelect" onchange="onMajorSelectChange()"></select>
    <label class="field-label">중단원</label>
    <select class="field" id="minorSelect"></select>
    <label class="field-label">영상 제목 (비워두면 자동)</label>
    <input class="field" id="titleInput" placeholder="직접 입력하거나 비워두세요">
    <label class="field-label">영상 길이 (예: 3:25 또는 12:08)</label>
    <input class="field" id="durationInput" placeholder="mm:ss 형식으로 입력">
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('addModal')">취소</button>
      <button class="btn-ok" id="saveVideoBtn" onclick="doAddVideo()">저장하기 💾</button>
    </div>
  </div>
</div>

<!-- 목차 편집 모달 -->
<div class="backdrop" id="tocModal" onclick="bdClick(event,'tocModal')">
  <div class="sheet">
    <div class="drag-handle"></div>
    <h2>📋 목차 편집</h2>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">대단원·중단원 이름을 수정하고 추가·삭제할 수 있어요.</p>
    <div class="toc-grade-tabs" id="tocGradeTabs"></div>
    <button class="toc-add-major" onclick="addMajor()">＋ 대단원 추가</button>
    <div id="tocBody"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('tocModal')">취소</button>
      <button class="btn-ok" onclick="saveToc()">저장하기 ✅</button>
    </div>
  </div>
</div>

<!-- 학년 편집 모달 -->
<div class="backdrop" id="gradeModal" onclick="bdClick(event,'gradeModal')">
  <div class="sheet">
    <div class="drag-handle"></div>
    <h2>🏫 학년 편집</h2>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">학년 이름을 수정하거나 추가·삭제할 수 있어요.</p>
    <div class="grade-list" id="gradeList"></div>
    <button class="grade-add-btn" onclick="addGradeItem()">＋ 학년 추가</button>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('gradeModal')">취소</button>
      <button class="btn-ok" onclick="saveGrades()">저장하기 ✅</button>
    </div>
  </div>
</div>

<!-- Firebase SDK (module) -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
  getFirestore, doc, getDoc, setDoc,
  collection, addDoc, deleteDoc, onSnapshot
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyD_DEKiwYD2MvGQxez80llnOGEmkyY2A1Q",
  authDomain: "school-notebook-multi.firebaseapp.com",
  projectId: "school-notebook-multi",
  storageBucket: "school-notebook-multi.firebasestorage.app",
  messagingSenderId: "78709255917",
  appId: "1:78709255917:web:e69cf4da157053ee7a26e4"
});
const db = getFirestore(app);

// ── 상태
let grades = ['중학교 2학년', '중학교 3학년'];
let toc = [
  [ // 중2 비상교육 도덕① 2022개정
    { major:'Ⅰ. 자신과의 관계',       minors:['1. 자아와 도덕적인 삶','2. 도덕적인 사람의 모습','3. 행복과 도덕'] },
    { major:'Ⅱ. 타인과의 관계',       minors:['1. 바람직한 가정의 모습','2. 우정의 소중함','3. 가상공간과 타인 존중'] },
    { major:'Ⅲ. 사회·공동체와의 관계', minors:['1. 인권의 보편성','2. 다양한 문화와 종교의 공존','3. 통일의 의미와 가치'] },
    { major:'Ⅳ. 자연과의 관계',       minors:['1. 생명을 존중하는 삶'] },
  ],
  [ // 중3 미래엔 도덕② 2015개정
    { major:'Ⅰ. 타인과의 관계',          minors:['1. 정보 통신 윤리','2. 평화적 갈등 해결','3. 폭력의 문제'] },
    { major:'Ⅱ. 사회·공동체와의 관계',   minors:['1. 도덕적 시민','2. 사회 정의','3. 북한 이해','4. 통일 윤리 의식'] },
    { major:'Ⅲ. 자연·초월과의 관계',     minors:['1. 자연관','2. 과학과 윤리','3. 삶의 소중함'] },
  ],
];
let videos = [];
let curGrade = 0;
let tocEditGrade = 0;
let tocDraft = [];
let gradesDraft = [];
const BADGE = ['m0','m1','m2','m3','m4'];

// ══ Firestore ══
async function loadConfig() {
  try {
    const snap = await getDoc(doc(db,'moral_videos','config'));
    if (snap.exists()) {
      const d = snap.data();
      if (d.grades?.length) grades = d.grades;
      if (d.toc?.length)    toc    = d.toc;
    } else {
      await saveConfig();
    }
  } catch(e) { console.error('config 로드 실패',e); }
}
async function saveConfig() {
  await setDoc(doc(db,'moral_videos','config'), { grades, toc });
}
function subscribeVideos() {
  onSnapshot(collection(db,'moral_videos_list'), snap => {
    videos = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    renderMain();
  });
}

// ══ 렌더 ══
function renderGradeTabs() {
  document.getElementById('gradeTabs').innerHTML = grades.map((g,i) =>
    `<button class="grade-tab${i===curGrade?' active':''}" onclick="switchGrade(${i},this)">${g}</button>`
  ).join('');
}

function renderMain() {
  const majors = toc[curGrade] || [];
  if (!majors.length) {
    document.getElementById('mainArea').innerHTML =
      `<div class="empty-grade"><div class="ei">📭</div><div>목차가 없어요 — 목차 편집에서 추가해보세요</div></div>`;
    return;
  }
  document.getElementById('mainArea').innerHTML = majors.map((m, mi) => {
    const hasSubs = m.minors?.length > 0;
    const totalVids = videos.filter(v => v.gi===curGrade && v.mi===mi).length;
    let inner = '';
    if (hasSubs) {
      inner = m.minors.map((sName, si) => {
        const vids = videos
          .filter(v => v.gi===curGrade && v.mi===mi && v.si===si)
          .sort((a,b) => (a.durSec||99999) - (b.durSec||99999));
        return `
          <div class="minor-section">
            <div class="minor-header">
              <span class="minor-label">${sName.split('.')[0].trim()}</span>
              <span class="minor-title">${sName.replace(/^\d+\.\s*/,'')}</span>
              <span class="minor-count">영상 ${vids.length}개</span>
            </div>
            <div class="video-grid">
              ${vids.length ? vids.map(v=>cardHtml(v,sName)).join('') : `<div class="no-video">아직 등록된 영상이 없어요</div>`}
            </div>
          </div>`;
      }).join('');
    } else {
      const vids = videos
        .filter(v => v.gi===curGrade && v.mi===mi)
        .sort((a,b) => (a.durSec||99999) - (b.durSec||99999));
      inner = `<div class="video-grid">${vids.length ? vids.map(v=>cardHtml(v,'')).join('') : `<div class="no-video">아직 등록된 영상이 없어요</div>`}</div>`;
    }
    return `
      <div class="major-section open" id="major-${curGrade}-${mi}">
        <div class="major-header" onclick="toggleMajor('major-${curGrade}-${mi}')">
          <span class="major-badge ${BADGE[mi%5]}">${roman(mi+1)}</span>
          <span class="major-title">${m.major.replace(/^[Ⅰ-Ⅹ]+\.\s*/,'')}</span>
          <span class="major-count">영상 ${totalVids}개</span>
          <span class="major-chevron">▼</span>
        </div>
        <div class="major-body">${inner}</div>
      </div>`;
  }).join('');
}

function cardHtml(v, subName) {
  const durTag = v.duration
    ? `<span class="dur-tag">⏱ ${v.duration}</span>`
    : '';
  return `
    <div class="video-card">
      <button class="card-del" onclick="deleteVideo('${v.id}')" title="삭제">×</button>
      <a class="card-inner" href="https://youtu.be/${v.videoId}" target="_blank">
        <div class="thumb-wrap">
          <img src="https://img.youtube.com/vi/${v.videoId}/mqdefault.jpg" loading="lazy">
          <div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
          <span class="yt-tag">YouTube</span>
          ${durTag}
        </div>
        <div class="card-info">
          <div class="card-title">${v.title}</div>
          ${subName ? `<div class="card-sub">${subName}</div>` : ''}
        </div>
      </a>
    </div>`;
}

function roman(n) {
  return ['Ⅰ','Ⅱ','Ⅲ','Ⅳ','Ⅴ','Ⅵ','Ⅶ','Ⅷ','Ⅸ','Ⅹ'][n-1] || n;
}

function toggleMajor(id) {
  document.getElementById(id)?.classList.toggle('open');
}

// ══ 학년 탭 전환 ══
function switchGrade(idx) {
  curGrade = idx;
  document.querySelectorAll('.grade-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  renderMain();
}

// ══ 영상 추가 ══
function openAddVideo() {
  document.getElementById('urlInput').value = '';
  document.getElementById('titleInput').value = '';
  document.getElementById('durationInput').value = '';
  document.getElementById('thumbPreview').classList.remove('show');
  fillGradeSelect();
  openModal('addModal');
}
function fillGradeSelect() {
  document.getElementById('gradeSelect').innerHTML = grades.map((g,i)=>`<option value="${i}">${g}</option>`).join('');
  document.getElementById('gradeSelect').value = curGrade;
  fillMajorSelect();
}
function onGradeSelectChange() { fillMajorSelect(); }
function fillMajorSelect() {
  const gi = +document.getElementById('gradeSelect').value;
  document.getElementById('majorSelect').innerHTML = (toc[gi]||[]).map((m,i)=>`<option value="${i}">${m.major}</option>`).join('');
  fillMinorSelect();
}
function onMajorSelectChange() { fillMinorSelect(); }
function fillMinorSelect() {
  const gi = +document.getElementById('gradeSelect').value;
  const mi = +document.getElementById('majorSelect').value;
  const subs = toc[gi]?.[mi]?.minors || [];
  document.getElementById('minorSelect').innerHTML = subs.length
    ? subs.map((s,i)=>`<option value="${i}">${s}</option>`).join('')
    : '<option value="0">해당 없음</option>';
}
function onUrlInput(val) {
  const id = extractId(val.trim());
  const box = document.getElementById('thumbPreview');
  if (id) { document.getElementById('thumbImg').src=`https://img.youtube.com/vi/${id}/mqdefault.jpg`; box.classList.add('show'); }
  else box.classList.remove('show');
}
function extractId(url) {
  for (const p of [/youtu\.be\/([^?&\s]+)/,/[?&]v=([^&\s]+)/,/shorts\/([^?/\s]+)/]) {
    const m=url.match(p); if(m) return m[1];
  }
  return null;
}
async function doAddVideo() {
  const url = document.getElementById('urlInput').value.trim();
  const id = extractId(url);
  if (!id) { alert('올바른 유튜브 URL을 입력해주세요.'); return; }
  const gi = +document.getElementById('gradeSelect').value;
  const mi = +document.getElementById('majorSelect').value;
  const si = +document.getElementById('minorSelect').value;
  const title = document.getElementById('titleInput').value.trim() || '제목 없음';
  const duration = document.getElementById('durationInput').value.trim();
  // mm:ss → 초로 변환해서 정렬에 사용
  const durSec = parseDuration(duration);
  const btn = document.getElementById('saveVideoBtn');
  btn.textContent='저장 중...'; btn.disabled=true;
  try {
    await addDoc(collection(db,'moral_videos_list'), { gi, mi, si, videoId:id, title, duration, durSec });
    closeModal('addModal');
    curGrade = gi;
    renderGradeTabs();
  } catch(e) { alert('저장 실패: '+e.message); }
  finally { btn.textContent='저장하기 💾'; btn.disabled=false; }
}

// mm:ss 또는 h:mm:ss → 초
function parseDuration(str) {
  if (!str) return 99999; // 시간 없으면 맨 뒤로
  const parts = str.split(':').map(Number);
  if (parts.length === 2) return parts[0]*60 + parts[1];
  if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  return 99999;
}
async function deleteVideo(id) {
  const v = videos.find(v=>v.id===id);
  if (!v || !confirm(`"${v.title}" 영상을 삭제할까요?`)) return;
  try { await deleteDoc(doc(db,'moral_videos_list',id)); }
  catch(e) { alert('삭제 실패: '+e.message); }
}

// ══ 목차 편집 ══
function openToc() {
  tocDraft = toc.map(g=>g.map(m=>({ major:m.major, minors:[...m.minors] })));
  tocEditGrade = 0;
  renderTocGradeTabs();
  renderTocBody();
  openModal('tocModal');
}
function renderTocGradeTabs() {
  document.getElementById('tocGradeTabs').innerHTML = grades.map((g,i)=>
    `<button class="toc-gtab${i===tocEditGrade?' active':''}" onclick="switchTocGrade(${i},this)">${g}</button>`
  ).join('');
}
function switchTocGrade(idx, el) {
  saveTocInputs();
  tocEditGrade = idx;
  document.querySelectorAll('.toc-gtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTocBody();
}
function saveTocInputs() {
  const blocks = document.querySelectorAll('.toc-major-block');
  tocDraft[tocEditGrade] = Array.from(blocks).map(block => ({
    major: block.querySelector('.toc-major-input').value.trim(),
    minors: Array.from(block.querySelectorAll('.toc-minor-input')).map(i=>i.value.trim()).filter(Boolean)
  }));
}
function renderTocBody() {
  const g = tocDraft[tocEditGrade] || [];
  document.getElementById('tocBody').innerHTML = g.map((m,mi) => `
    <div class="toc-major-block" data-mi="${mi}">
      <div class="toc-major-row">
        <span class="toc-major-num">${roman(mi+1)}</span>
        <input class="toc-major-input" value="${m.major}" placeholder="대단원 이름">
        <button class="toc-del-btn" onclick="delMajor(${mi})">×</button>
      </div>
      <div class="toc-minor-list">
        ${m.minors.map((s,si)=>`
          <div class="toc-minor-row">
            <span class="toc-minor-num">${si+1}</span>
            <input class="toc-minor-input" value="${s}" placeholder="중단원 이름">
            <button class="toc-del-btn" onclick="delMinor(${mi},${si})">×</button>
          </div>`).join('')}
        <button class="toc-add-minor" onclick="addMinor(${mi})">＋ 중단원 추가</button>
      </div>
    </div>`).join('');
}
function addMajor() {
  saveTocInputs();
  if (!tocDraft[tocEditGrade]) tocDraft[tocEditGrade]=[];
  tocDraft[tocEditGrade].push({ major:'', minors:[] });
  renderTocBody();
  const ins = document.querySelectorAll('.toc-major-input');
  if (ins.length) ins[ins.length-1].focus();
}
function delMajor(mi) { saveTocInputs(); tocDraft[tocEditGrade].splice(mi,1); renderTocBody(); }
function addMinor(mi) {
  saveTocInputs();
  tocDraft[tocEditGrade][mi].minors.push('');
  renderTocBody();
  const rows = document.querySelectorAll(`.toc-major-block[data-mi="${mi}"] .toc-minor-input`);
  if (rows.length) rows[rows.length-1].focus();
}
function delMinor(mi,si) { saveTocInputs(); tocDraft[tocEditGrade][mi].minors.splice(si,1); renderTocBody(); }
async function saveToc() {
  saveTocInputs();
  toc = tocDraft.map(g=>g.filter(m=>m.major).map(m=>({ major:m.major, minors:m.minors.filter(s=>s) })));
  closeModal('tocModal');
  try { await saveConfig(); } catch(e) { console.error(e); }
  fillMajorSelect();
  renderMain();
}

// ══ 학년 편집 ══
function openGradeEdit() {
  gradesDraft = [...grades];
  renderGradeList();
  openModal('gradeModal');
}
function renderGradeList() {
  document.getElementById('gradeList').innerHTML = gradesDraft.map((g,i)=>`
    <div class="grade-item">
      <input value="${g}" placeholder="학년 이름 (예: 중학교 2학년)">
      <button class="toc-del-btn" onclick="delGradeItem(${i})">×</button>
    </div>`).join('');
}
function addGradeItem() {
  saveGradeInputs();
  gradesDraft.push('');
  renderGradeList();
  const ins = document.querySelectorAll('#gradeList input');
  if (ins.length) ins[ins.length-1].focus();
}
function delGradeItem(i) { saveGradeInputs(); gradesDraft.splice(i,1); renderGradeList(); }
function saveGradeInputs() {
  gradesDraft = Array.from(document.querySelectorAll('#gradeList input')).map(i=>i.value.trim());
}
async function saveGrades() {
  saveGradeInputs();
  const filtered = gradesDraft.filter(g=>g);
  if (!filtered.length) { alert('학년이 최소 1개 있어야 해요.'); return; }
  while (toc.length < filtered.length) toc.push([]);
  grades = filtered;
  if (curGrade >= grades.length) curGrade = 0;
  closeModal('gradeModal');
  try { await saveConfig(); } catch(e) { console.error(e); }
  renderGradeTabs();
  renderMain();
}

// ══ 모달 공통 ══
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function bdClick(e, id) { if (e.target.id===id) closeModal(id); }

// ══ 전역 노출 (onclick에서 호출 가능하도록) ══
window.toggleMajor       = toggleMajor;
window.switchGrade       = switchGrade;
window.openAddVideo      = openAddVideo;
window.onUrlInput        = onUrlInput;
window.onGradeSelectChange = onGradeSelectChange;
window.onMajorSelectChange = onMajorSelectChange;
window.doAddVideo        = doAddVideo;
window.deleteVideo       = deleteVideo;
window.openToc           = openToc;
window.switchTocGrade    = switchTocGrade;
window.addMajor          = addMajor;
window.delMajor          = delMajor;
window.addMinor          = addMinor;
window.delMinor          = delMinor;
window.saveToc           = saveToc;
window.openGradeEdit     = openGradeEdit;
window.addGradeItem      = addGradeItem;
window.delGradeItem      = delGradeItem;
window.saveGrades        = saveGrades;
window.openModal         = openModal;
window.closeModal        = closeModal;
window.bdClick           = bdClick;

// ══ 초기화 ══
async function init() {
  document.getElementById('mainArea').innerHTML =
    `<div class="empty-grade"><div class="ei">⏳</div><div>불러오는 중...</div></div>`;
  await loadConfig();
  renderGradeTabs();
  fillGradeSelect();
  subscribeVideos();
}
init();
</script>
</body>
</html>
